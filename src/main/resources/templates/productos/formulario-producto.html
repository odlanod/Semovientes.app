<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{layout/layout :: layout(contenido=~{::section})}">
<body>
    <section>
        <!-- Encabezado con Estilo -->
        <div class="mb-4">
            <div class="d-flex align-items-center">
                <div class="bg-success text-white p-3 rounded-3 me-3 shadow-sm">
                    <i class="bi bi-box-seam fs-3"></i>
                </div>
                <div>
                    <h1 class="text-dark fw-bold mb-0">Nuevo Insumo</h1>
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb mb-0">
                            <li class="breadcrumb-item"><a th:href="@{/productos}" class="text-success text-decoration-none">Inventario</a></li>
                            <li class="breadcrumb-item active" aria-current="page">Registro de Producto</li>
                        </ol>
                    </nav>
                </div>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-xl-9 col-lg-11">
                <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
                    <!-- Cabecera del Card -->
                    <div class="card-header bg-white border-bottom py-3">
                        <div class="d-flex align-items-center justify-content-between">
                            <h5 class="card-title mb-0 fw-bold text-muted">
                                <i class="bi bi-pencil-square me-2 text-success"></i>Información General
                            </h5>
                            <span class="badge bg-light text-success border border-success-subtle">Paso 1 de 1</span>
                        </div>
                    </div>

                    <!-- Cuerpo del Formulario -->
                    <div class="card-body p-4 p-md-5">
                        <form th:action="@{/productos/guardar}" th:object="${producto}" method="post">
                            
                            <div class="row g-4">
                                <!-- Nombre del Producto -->
                                <div class="col-md-12">
                                    <label class="form-label fw-semibold text-secondary">Nombre del Producto</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-tag text-muted"></i></span>
                                        <input type="text" th:field="*{nombre}" class="form-control border-start-0 ps-0" 
                                               placeholder="Ej. Fertilizante Urea o Leche Entera" required>
                                    </div>
                                    <div class="form-text">El nombre debe ser descriptivo para facilitar la búsqueda.</div>
                                </div>

                                <!-- Tipo de Producto -->
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold text-secondary">Tipo de Producto</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-grid text-muted"></i></span>
                                        <select th:field="*{tipoProducto}" class="form-select border-start-0 ps-0" required>
                                            <option value="" selected disabled>Seleccione una categoría...</option>
                                            <option value="Lacteo">Lacteo</option>
                                            <option value="Agricola">Agricola</option>
                                        </select>
                                    </div>
                                </div>

                                <!-- Unidad de Medida -->
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold text-secondary">Unidad de Medida</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-rulers text-muted"></i></span>
                                        <select th:field="*{unidadMedida}" class="form-select border-start-0 ps-0" required>
                                            <option value="" selected disabled>Seleccione unidad...</option>
                                            <option value="Kilogramo">Kilogramo (kg)</option>
                                            <option value="Litro">Litro (L)</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                            <hr class="my-5 opacity-25">

                            <!-- Botones de Acción -->
                            <div class="d-flex justify-content-between align-items-center">
                                <a th:href="@{/productos}" class="btn btn-link text-decoration-none text-muted fw-bold">
                                    <i class="bi bi-arrow-left me-1"></i> Volver al listado
                                </a>
                                <div class="gap-2 d-flex">
                                    <button type="reset" class="btn btn-light px-4">Limpiar</button>
                                    <button type="submit" class="btn btn-success px-5 py-2 shadow-sm fw-bold">
                                        <i class="bi bi-cloud-check me-2"></i>Guardar Producto
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
